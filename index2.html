<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Diary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🎀 Diary</h2>
        <ul>
            <li onclick="showSection('home')">🏠 Home</li>
            <li onclick="showSection('quote')">💌 Quotes</li>
            <li onclick="showSection('todo')">📝 To-do</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <div class="container">

        <!-- Home -->
        <section id="home" class="section active">
            <h1>Hi princess 💕</h1>
            <p>Welcome to your soft girl digital space ✨</p>
        </section>

        <!-- Quotes -->
        <section id="quote" class="section">
            <h1>💌 Daily Quote</h1>
            <p id="quoteText">Click the button for motivation ✨</p>
            <button onclick="newQuote()">New Quote 🌸</button>
        </section>

        <!-- To-do -->
        <section id="todo" class="section">
            <h1>📝 To-do List</h1>
            <input type="text" id="taskInput" placeholder="Add a cute task...">
            <button onclick="addTask()">Add 🎀</button>
            <ul id="taskList"></ul>
        </section>

    </div>

    <script src="index.js"></script>
</body>
</html>
