<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Pastel Website</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌸 My Cute Space 🌸</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Diary</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <!-- Hero -->
        <section class="hero">
            <h2 id="message">Hi cutie 💕</h2>
            <p>Welcome to my soft pink world ✨</p>
            <button onclick="changeMessage()">Click for a surprise 💌</button>
        </section>

        <!-- Card Section -->
        <section class="cards">
            <div class="card">
                <h3>🌷 Mood Counter</h3>
                <p id="count">0</p>
                <button onclick="increaseCount()">Feeling Happy 🎀</button>
            </div>

            <div class="card">
                <h3>💭 Notes</h3>
                <input type="text" id="noteInput" placeholder="Write something cute...">
                <button onclick="addNote()">Add ✨</button>
                <ul id="noteList"></ul>
            </div>
        </section>
    </main>

    <footer>
        <p>Made with 💗 | 2026</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
